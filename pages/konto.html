<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moje konto | Vibe</title>
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#ffffff" />
  <link rel="icon" href="/img/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css?v=34" />
</head>
<body data-page="konto">
  <header class="site-header">
    <div class="container header-inner">
      <a href="/" class="logo"><img src="/img/logo.jpg" alt="Vibe" width="1000" height="804" class="logo-img"></a>
      <nav class="main-nav">
        <a href="/" class="nav-link">Sklep</a>
        <a href="/#sklep" class="nav-link">Kolekcja</a>
        <a href="/eventy" class="nav-link">Eventy</a>
      </nav>
      <div class="lang-switch" role="group" aria-label="Język"><button type="button" data-lang="pl">PL</button><button type="button" data-lang="en">EN</button><button type="button" data-lang="de">DE</button></div>
      <a href="https://tobilet.pl/vibe-city-festiwal-laczymy-pokolenia.html" class="btn-ticket" target="_blank" rel="noopener">🎟️ Kup bilet</a>
      <a href="/#sklep" class="btn btn-ghost" style="margin-left:auto;padding:11px 20px">← Sklep</a>
    </div>
  </header>

  <div class="container account-head">
    <h1>Moje konto</h1>
    <p id="accountHello">Ładowanie…</p>
  </div>

  <div class="container account-grid">
    <aside class="account-side">
      <a href="#" class="active">Moje konto</a>
      <a href="/#sklep">Kontynuuj zakupy</a>
      <button class="logout" id="logoutBtn">Wyloguj się</button>
    </aside>

    <div>
      <div class="panel-card">
        <h2>Dane konta</h2>
        <form id="profileForm" class="checkout-form">
          <label>Imię i nazwisko<input name="name" required minlength="2" /></label>
          <label>E-mail<input name="email" type="email" /></label>
          <p class="form-error" id="profileErr" hidden></p>
          <button class="btn btn-primary" type="submit">Zapisz dane</button>
        </form>
      </div>
      <div class="panel-card">
        <h2>Zmiana hasła</h2>
        <form id="passwordForm" class="checkout-form">
          <label>Aktualne hasło<input name="current" type="password" required autocomplete="current-password" /></label>
          <label>Nowe hasło (min. 8 znaków)<input name="newpass" type="password" required minlength="8" autocomplete="new-password" /></label>
          <p class="form-error" id="passwordErr" hidden></p>
          <button class="btn btn-primary" type="submit">Zmień hasło</button>
        </form>
      </div>
      <div class="panel-card">
        <h2>Historia zamówień</h2>
        <div id="orders"><p class="muted">Ładowanie zamówień…</p></div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast" hidden></div>
  <script src="/js/account.js?v=26"></script>
  <script src="/js/i18n.js?v=18"></script>
</body>
</html>
