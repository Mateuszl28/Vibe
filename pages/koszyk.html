<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Koszyk | Vibe</title>
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#ffffff" />
  <link rel="icon" href="/img/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css?v=32" />
</head>
<body data-page="cart">
  <div class="announce">__ANNOUNCE__</div>
  <header class="site-header">
    <div class="container header-inner">
      <a href="/" class="logo"><img src="/img/logo.jpg" alt="Vibe" class="logo-img"></a>
      <nav class="main-nav">
        <a href="/" class="nav-link">Wszystko</a>
        <a href="/#sklep" class="nav-link">Bluzy</a>
        <a href="/#sklep" class="nav-link">Koszulki</a>
        <a href="/eventy" class="nav-link">Eventy</a>
      </nav>
      <div class="lang-switch" role="group" aria-label="Język"><button type="button" data-lang="pl">PL</button><button type="button" data-lang="en">EN</button><button type="button" data-lang="de">DE</button></div>
      <a href="https://tobilet.pl/vibe-city-festiwal-laczymy-pokolenia.html" class="btn-ticket" target="_blank" rel="noopener">🎟️ Kup bilet</a>
      <a href="/ulubione" class="account-btn" aria-label="Ulubione">♥ <span id="wishCount">0</span></a>
      <button class="cart-btn" id="cartBtn" aria-label="Otwórz koszyk">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
        <span class="cart-count" id="cartCount">0</span>
      </button>
      <a href="/konto" class="account-btn" id="accountBtn" aria-label="Moje konto">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"></circle><path d="M4 21v-1a6 6 0 0 1 6-6h4a6 6 0 0 1 6 6v1"></path></svg>
        <span id="accountLabel">Konto</span>
      </a>
    </div>
  </header>

  <main class="container" style="padding:40px 0 70px">
    <h1 style="font-size:1.9rem;margin-bottom:20px">Twój koszyk</h1>
    <div id="cartPage"><p class="muted">Ładowanie…</p></div>
  </main>

  <div class="modal-overlay" id="checkoutModal" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-label="Zamówienie">
      <button class="modal-close" data-close-checkout aria-label="Zamknij">&times;</button>
      <div id="checkoutContent"></div>
    </div>
  </div>
  <!-- ukryty drawer dla wspolnej logiki koszyka -->
  <div class="drawer-overlay" id="cartDrawer" hidden>
    <aside class="drawer"><div class="drawer-head"><h3>Koszyk</h3><button class="modal-close" data-close-cart>&times;</button></div>
      <div class="drawer-body" id="cartItems"></div>
      <div class="drawer-foot"><div class="cart-total"><span>Razem</span><strong id="cartTotal">0,00 zł</strong></div></div>
    </aside>
  </div>
  <div class="toast" id="toast" hidden></div>
  <script src="/js/app.js?v=35"></script>
  <script src="/js/i18n.js?v=18"></script>
</body>
</html>
